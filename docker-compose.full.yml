version: '3.8'

services:
  # ============================================================
  # Supabase Stack - Complete Backend Infrastructure
  # ============================================================
  
  # PostgreSQL with pgvector for embeddings
  postgres:
    container_name: hanzo-postgres
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: hanzo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Studio (Admin UI)
  supabase-studio:
    container_name: hanzo-supabase-studio
    image: supabase/studio:latest
    ports:
      - "3000:3000"
    environment:
      STUDIO_PG_META_URL: http://postgres-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: Hanzo AI
      DEFAULT_PROJECT_NAME: Hanzo Dev
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDYyMzkwMjIsImV4cCI6MTk2MTgxNTAyMn0.PldKp_V8KF5SJR3NwAYXMrnLvW7u0A5zTYYZSEHBL3I}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY0NjIzOTAyMiwiZXhwIjoxOTYxODE1MDIyfQ.Y0VqPBNhih6jvKW2oJQZRsqsnuWI6x5XF_BnpXVzilc}
    depends_on:
      postgres:
        condition: service_healthy

  # Supabase Auth Service
  supabase-auth:
    container_name: hanzo-supabase-auth
    image: supabase/gotrue:latest
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/hanzo?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3001}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_EMAIL_ENABLE: true
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mailhog}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@hanzo.ai}
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: "Confirm your Hanzo AI account"
      GOTRUE_MAILER_SUBJECTS_RECOVERY: "Reset your Hanzo AI password"
      GOTRUE_MAILER_SUBJECTS_INVITE: "You've been invited to Hanzo AI"
    depends_on:
      postgres:
        condition: service_healthy

  # Supabase Realtime (WebSocket)
  supabase-realtime:
    container_name: hanzo-supabase-realtime
    image: supabase/realtime:latest
    ports:
      - "4000:4000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: hanzo
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO realtime'
      DB_ENC_KEY: ${DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    depends_on:
      postgres:
        condition: service_healthy

  # Supabase Storage
  supabase-storage:
    container_name: hanzo-supabase-storage
    image: supabase/storage-api:latest
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDYyMzkwMjIsImV4cCI6MTk2MTgxNTAyMn0.PldKp_V8KF5SJR3NwAYXMrnLvW7u0A5zTYYZSEHBL3I}
      SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY0NjIzOTAyMiwiZXhwIjoxOTYxODE1MDIyfQ.Y0VqPBNhih6jvKW2oJQZRsqsnuWI6x5XF_BnpXVzilc}
      POSTGREST_URL: http://postgres:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/hanzo?search_path=storage
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: us-east-1
      GLOBAL_S3_BUCKET: supabase-storage
    volumes:
      - storage_data:/var/lib/storage
    depends_on:
      postgres:
        condition: service_healthy

  # Kong API Gateway
  kong:
    container_name: hanzo-kong
    image: kong:latest
    ports:
      - "8000:8000"  # HTTP proxy
      - "8443:8443"  # HTTPS proxy
      - "8001:8001"  # Admin API
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,rate-limiting
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml
    depends_on:
      - supabase-auth
      - supabase-storage
      - supabase-realtime

  # PostgREST (REST API for Postgres)
  postgrest:
    container_name: hanzo-postgrest
    image: postgrest/postgrest:latest
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/hanzo
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      postgres:
        condition: service_healthy

  # Postgres Meta (Database introspection)
  postgres-meta:
    container_name: hanzo-postgres-meta
    image: supabase/postgres-meta:latest
    ports:
      - "8080:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: hanzo
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # LLM Infrastructure - Optimized Model Serving
  # ============================================================

  # vLLM - High-performance LLM serving (for NVIDIA GPUs)
  vllm:
    container_name: hanzo-vllm
    image: vllm/vllm-openai:latest
    ports:
      - "8100:8000"  # OpenAI-compatible API
    environment:
      - MODEL=${VLLM_MODEL:-facebook/opt-125m}  # Default small model
      - HF_TOKEN=${HF_TOKEN:-}
      - TENSOR_PARALLEL_SIZE=1
      - GPU_MEMORY_UTILIZATION=0.95
      - MAX_MODEL_LEN=4096
      - DTYPE=auto
      - TRUST_REMOTE_CODE=true
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${MODEL}
      --port 8000
      --trust-remote-code
      --max-model-len 4096
      --gpu-memory-utilization 0.95
    profiles:
      - gpu

  # MLX Server - For Apple Silicon (runs on host, not in container)
  # Note: MLX doesn't work well in containers, run natively instead

  # Ollama - For CPU/GPU model serving
  ollama:
    container_name: hanzo-ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

  # Text Generation Inference (TGI) - Hugging Face optimized serving
  tgi:
    container_name: hanzo-tgi
    image: ghcr.io/huggingface/text-generation-inference:latest
    ports:
      - "8200:80"
    environment:
      - MODEL_ID=${TGI_MODEL:-google/flan-t5-small}
      - HF_TOKEN=${HF_TOKEN:-}
      - MAX_BATCH_PREFILL_TOKENS=4096
      - MAX_BATCH_TOTAL_TOKENS=8192
      - MAX_INPUT_LENGTH=2048
      - MAX_TOTAL_TOKENS=4096
      - TRUST_REMOTE_CODE=true
    volumes:
      - ~/.cache/huggingface:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

  # ============================================================
  # Hanzo Services
  # ============================================================

  # Hanzod - Hanzo daemon
  hanzod:
    container_name: hanzod
    build:
      context: .
      dockerfile: Dockerfile.hanzod
    ports:
      - "3690:3690"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/hanzo
      - SUPABASE_URL=http://kong:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDYyMzkwMjIsImV4cCI6MTk2MTgxNTAyMn0.PldKp_V8KF5SJR3NwAYXMrnLvW7u0A5zTYYZSEHBL3I}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhbnpvZGV2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY0NjIzOTAyMiwiZXhwIjoxOTYxODE1MDIyfQ.Y0VqPBNhih6jvKW2oJQZRsqsnuWI6x5XF_BnpXVzilc}
      - VLLM_URL=http://vllm:8000
      - OLLAMA_URL=http://ollama:11434
      - TGI_URL=http://tgi:80
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
    volumes:
      - ./hanzo_config.toml:/app/hanzo_config.toml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--config", "/app/hanzo_config.toml", "--port", "3690"]

  # Hanzo Engine (if using mistral.rs)
  hanzo-engine:
    container_name: hanzo-engine
    build:
      context: ~/work/hanzo/engine
      dockerfile: Dockerfile
    ports:
      - "36900:36900"
    environment:
      - RUST_LOG=info
      - MODEL_TYPE=qwen3
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./models:/models
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

  # ============================================================
  # Supporting Services
  # ============================================================

  # Redis for caching
  redis:
    container_name: hanzo-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible storage
  minio:
    container_name: hanzo-minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Mailhog for email testing
  mailhog:
    container_name: hanzo-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # ============================================================
  # Monitoring
  # ============================================================

  # Prometheus
  prometheus:
    container_name: hanzo-prometheus
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana
  grafana:
    container_name: hanzo-grafana
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  storage_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:

# Networks
networks:
  default:
    name: hanzo-network
    driver: bridge