[package]
name = "hanzod"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.7", features = ["http2", "macros"] }
tower-http = { version = "0.5", features = ["cors"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
sled = "0.34"
reqwest = { version = "0.11", features = ["json"] }
clap = { version = "4", features = ["derive"] }
hex = "0.4"
num_cpus = "1.16"
sys-info = "0.9"
bollard = { version = "0.15", optional = true }

# Cryptography dependencies
ed25519-dalek = "2.1"
rand = "0.8"
sha2 = "0.10"
bs58 = "0.5"
argon2 = "0.5"
aes-gcm = "0.10"

# Hanzo Engine - embedded natively for high-performance inference
mistralrs-server-core = { path = "/Users/z/work/hanzo/engine/mistralrs-server-core", optional = true }
mistralrs-core = { path = "/Users/z/work/hanzo/engine/mistralrs-core", features = ["metal"], optional = true }

[dev-dependencies]
tempfile = "3"
mockito = "1"
proptest = "1"

[features]
default = ["blockchain", "marketplace", "quantum-staking", "engine"]
blockchain = []
marketplace = []
quantum-staking = []
docker = ["bollard"]
engine = ["mistralrs-server-core", "mistralrs-core"]
metal = ["engine", "mistralrs-core/metal"]
full = ["blockchain", "marketplace", "quantum-staking", "docker", "engine"]

[[bin]]
name = "hanzo"
path = "src/bin/hanzo.rs"

[[bin]]
name = "hanzod"
path = "src/main.rs"
