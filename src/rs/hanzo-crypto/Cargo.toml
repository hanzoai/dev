[package]
name = "hanzo-crypto"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core crypto dependencies
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1.5"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
ed25519-dalek = "2.1"
x25519-dalek = "2.0"
curve25519-dalek = "4.1"
argon2 = "0.5"

# Post-quantum crypto (using pqcrypto for now)
pqcrypto-kyber = "0.7"
pqcrypto-dilithium = "0.4"

# Utilities
zeroize = { version = "1.8", features = ["derive"] }
rand = "0.8"
rand_chacha = "0.3"
hex = "0.4"
base64 = "0.22"
thiserror = "1.0"

[dev-dependencies]
criterion = "0.5"
proptest = "1.0"

# Benchmarks will be added later
